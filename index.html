<!DOCTYPE html>
<html lang="tr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lima Shore AR Menü</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #info-btn {
      position: fixed; top: 20px; left: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.45); color: white;
      font-size: 18px; font-weight: 700; font-style: italic;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #btn-sol {
      position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.3);
      color: white; font-size: 28px; cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #btn-sag {
      position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.3);
      color: white; font-size: 28px; cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #urun-panel {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 6px; z-index: 9999;
    }
    #urun-adi {
      background: rgba(0,0,0,0.5); color: #e8c96d;
      padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
      text-align: center; max-width: 70vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #urun-fiyat {
      background: rgba(232,201,109,0.85); color: #1a1a2e;
      padding: 3px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    #kategori-wrapper {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      width: 92vw; max-width: 420px;
      background: rgba(0,0,0,0.6); border-radius: 20px; padding: 10px 8px;
      display: none; z-index: 9999; backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #kategori-menu {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%;
    }
    .kategori-btn {
      padding: 7px 2px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08); color: white;
      font-size: 10px; cursor: pointer; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
    }
    .kategori-btn.aktif {
      background: #e8c96d; color: #1a1a2e; border-color: #e8c96d; font-weight: 600;
    }
    #info-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20,20,40,0.97); border: 2px solid #e8c96d;
      border-radius: 20px; padding: 24px 20px; width: 85vw; max-width: 360px;
      z-index: 99999; display: none; flex-direction: column; gap: 12px;
      max-height: 80vh; overflow-y: auto;
    }
    #info-modal h2 { color: #e8c96d; font-size: 17px; text-align: center; font-weight: 600; }
    #info-modal .fiyat { color: white; font-size: 22px; font-weight: 700; text-align: center; }
    #info-modal .ayrac { height: 1px; background: rgba(232,201,109,0.3); }
    #info-modal .icerik-baslik { color: #e8c96d; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    #info-modal .icerik { color: rgba(255,255,255,0.85); font-size: 13px; line-height: 1.7; }
    #hedef-mesaj {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: white; padding: 12px 24px;
      border-radius: 24px; font-size: 13px; z-index: 9999; text-align: center;
      display: block; white-space: nowrap;
    }
  </style>
</head>

    let mevcutKategori = 'kahvalti'
    let mevcutIndex = 0
    let arAktif = false
    let infoAcik = false
    let touchStartX = 0
    let touchStartY = 0
    let swipeHedef = null

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX
      touchStartY = e.touches[0].clientY
      swipeHedef = e.target
    })

    document.addEventListener('touchend', e => {
      if (!arAktif || infoAcik) return
      const wrapper = document.getElementById('kategori-wrapper')
      if (wrapper.contains(swipeHedef)) return
      const diffX = touchStartX - e.changedTouches[0].clientX
      const diffY = Math.abs(touchStartY - e.changedTouches[0].clientY)
      if (Math.abs(diffX) > 50 && diffY < 60) {
        if (diffX > 0) sonrakiUrun()
        else oncekiUrun()
      }
    })

    function tumModellerGizle() {
      document.querySelectorAll('.model-container').forEach(el => {
        el.setAttribute('visible', false)
      })
    }

    function urunGoster(index) {
      tumModellerGizle()
      const urun = menu[mevcutKategori][index]
      const el = document.getElementById(urun.containerId)
      if (el) el.setAttribute('visible', true)
      document.getElementById('urun-adi').textContent = urun.ad
      document.getElementById('urun-fiyat').textContent = urun.fiyat
      document.getElementById('modal-adi').textContent = urun.ad
      document.getElementById('modal-fiyat').textContent = urun.fiyat
      document.getElementById('modal-icerik').textContent = urun.icerik
    }

    function sonrakiUrun() {
      mevcutIndex = (mevcutIndex + 1) % menu[mevcutKategori].length
      urunGoster(mevcutIndex)
    }

    function oncekiUrun() {
      mevcutIndex = (mevcutIndex - 1 + menu[mevcutKategori].length) % menu[mevcutKategori].length
      urunGoster(mevcutIndex)
    }

    function kategoriSec(btn, kategori) {
      if (!menu[kategori]) return
      document.querySelectorAll('.kategori-btn').forEach(b => b.classList.remove('aktif'))
      btn.classList.add('aktif')
      mevcutKategori = kategori
      mevcutIndex = 0
      urunGoster(0)
    }

    function infoToggle() {
      const modal = document.getElementById('info-modal')
      infoAcik = !infoAcik
      modal.style.display = infoAcik ? 'flex' : 'none'
    }

    function uiGoster() {
      document.getElementById('kategori-wrapper').style.display = 'block'
      document.getElementById('urun-panel').style.display = 'flex'
      document.getElementById('btn-sol').style.display = 'flex'
      document.getElementById('btn-sag').style.display = 'flex'
      document.getElementById('info-btn').style.display = 'flex'
      document.getElementById('hedef-mesaj').style.display = 'none'
    }

    function uiGizle() {
      document.getElementById('kategori-wrapper').style.display = 'none'
      document.getElementById('urun-panel').style.display = 'none'
      document.getElementById('btn-sol').style.display = 'none'
      document.getElementById('btn-sag').style.display = 'none'
      document.getElementById('info-btn').style.display = 'none'
      document.getElementById('info-modal').style.display = 'none'
      document.getElementById('hedef-mesaj').style.display = 'block'
      document.getElementById('hedef-mesaj').textContent = '📷 Kamerayı masa işaretçisine tutun'
      infoAcik = false
    }

    document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
      arAktif = true
      uiGoster()
      urunGoster(mevcutIndex)
    })

    document.querySelector('[mindar-image-target]').addEventListener('targetLost', () => {
