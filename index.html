<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model id="m0" src="./models/chocolate_muffin.glb"
        position="0 0.1 0" scale="0 0 0">
      </a-gltf-model>
      <a-gltf-model id="m1" src="./models/cookie.glb"
        position="0 0.1 0" scale="0.08 0.08 0.08">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <button onclick="gec()" style="position:fixed;bottom:40px;right:20px;padding:20px;font-size:20px;z-index:9999">▶</button>
  <div id="log" style="position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);color:lime;padding:10px;z-index:9999;font-size:14px">Yükleniyor...</div>

  <script>
    let index = 0

    // Model yükleme durumunu izle
    window.addEventListener('load', () => {
      const m0 = document.getElementById('m0')
      const m1 = document.getElementById('m1')

      m0.addEventListener('model-loaded', () => log('m0 yüklendi ✅'))
      m0.addEventListener('model-error', () => log('m0 HATA ❌'))
      m1.addEventListener('model-loaded', () => log('m1 yüklendi ✅'))
      m1.addEventListener('model-error', () => log('m1 HATA ❌'))
    })

    function log(msg) {
      document.getElementById('log').innerHTML += '<br>' + msg
    }

    function gec() {
      const m0 = document.getElementById('m0')
      const m1 = document.getElementById('m1')

      if (index === 0) {
        m0.setAttribute('scale', '0 0 0')
        m1.setAttribute('scale', '0.08 0.08 0.08')
        index = 1
      } else {
        m1.setAttribute('scale', '0 0 0')
        m0.setAttribute('scale', '0.08 0.08 0.08')
        index = 0
      }
      log('Aktif model: m' + index)
    }
  </script>
</body>
</html>
